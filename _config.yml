# ==========================================
# 1. INFORMASI DASAR SITUS
# ==========================================
title: Blog JEA SOLUSI STUDIO
description: Catatan, dokumentasi, dan eksperimen kode.
theme: minima
baseurl: "/godev"
url: "https://jeasolusiglobal.github.io" 

# ==========================================
# 2. DATA PERUSAHAAN (Global Variables)
# ==========================================
company_email: "hello@jeasolusi.com"
company_phone: "+62 896 33057580"
office_address: "Bekasi, Jawa Barat, Indonesia"

# ==========================================
# 3. ZONA WAKTU & FORMAT TANGGAL
# ==========================================
timezone: Asia/Jakarta
date_format: "%d %B %Y"

# ==========================================
# 4. MEDIA SOSIAL
# ==========================================
github_username: jeasolusiglobal
linkedin_username: jeasolusi
twitter_username: jeasolusi

# ==========================================
# 5. PENGATURAN KONTEN & DEFAULT
# ==========================================
permalink: /:year/:month/:day/:title/

collections:
  services:
    output: true
    permalink: /services/:title/
  desktop_software:
    output: true
    permalink: /desktop-software/:title/
  downloads:
    output: true
    permalink: /downloads/:title/
  mobile_apps:
    output: true
    permalink: /mobile-apps/:title/
  gallery:
    output: true
    permalink: /gallery/:title/

# ==========================================
# 6. PLUGIN EKSKLUSIF (SEO & Paginasi)
# ==========================================
plugins:
  - jekyll-paginate
  - jekyll-seo-tag

# Konfigurasi Paginasi Halaman Blog
paginate: 6
paginate_path: "/blog/page:num/"

# ==========================================
# 7. RENDER MARKDOWN & SYNTAX HIGHLIGHTING
# ==========================================
markdown: kramdown
highlighter: rouge

# ==========================================
# 8. ANALITIK (Google Analytics)
# ==========================================
google_analytics: G-XXXXXXXXXX 

# ==========================================
# 9. FILE & FOLDER YANG DIABAIKAN (Exclude)
# ==========================================
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - script/
