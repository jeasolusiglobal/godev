---
layout: default
---

<div class="product-showcase">
  <!-- Bagian Kiri: Gambar Etalase -->
  <div class="product-image-wrapper">
    <img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" class="product-main-image">
  </div>

  <!-- Bagian Kanan: Detail & Tombol CTA -->
  <div class="product-details">
    <h1 class="product-title">{{ page.title }}</h1>
    <p class="product-short-desc">{{ page.short_desc }}</p>
    
    <!-- Area Harga atau Status (Bisa disesuaikan) -->
    <div class="product-pricing">
      {% if page.price %}
        <span class="price-tag">{{ page.price }}</span>
      {% else %}
        <span class="price-tag">Harga Menyesuaikan Proyek</span>
      {% endif %}
    </div>

    <!-- Tombol Pemesanan / Kontak -->
    <div class="product-actions">
      <a href="mailto:hello@jeasolusi.com?subject=Konsultasi Layanan: {{ page.title }}" class="btn-buy">Mulai Konsultasi</a>
      <a href="{{ site.baseurl }}/services/" class="btn-back">← Kembali ke Layanan</a>
    </div>

    <hr style="border: 0; border-top: 1px solid #eaeaea; margin: 30px 0;">

    <!-- Bagian Deskripsi Lengkap (Diambil dari isi Markdown) -->
    <div class="product-full-content">
      <h3>Detail Layanan</h3>
      {{ content }}
    </div>
  </div>
</div>

<style>
  /* CSS untuk Tampilan Etalase / Toko Online */
  .product-showcase {
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    margin-top: 20px;
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.05);
  }

  .product-image-wrapper {
    flex: 1 1 400px; /* Gambar akan mengambil ruang yang proporsional */
  }

  .product-main-image {
    width: 100%;
    border-radius: 10px;
    object-fit: cover;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .product-details {
    flex: 1 1 400px;
    display: flex;
    flex-direction: column;
  }

  .product-title {
    font-size: 2.2em;
    margin-top: 0;
    margin-bottom: 10px;
    color: #2c3e50;
  }

  .product-short-desc {
    font-size: 1.1em;
    color: #7f8c8d;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .product-pricing {
    margin-bottom: 25px;
  }

  .price-tag {
    font-size: 1.4em;
    font-weight: bold;
    color: #27ae60;
    background-color: #eafaf1;
    padding: 8px 15px;
    border-radius: 6px;
    display: inline-block;
  }

  .product-actions {
    display: flex;
    gap: 15px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-buy {
    background-color: #e67e22; /* Warna Oranye khas tombol pemesanan */
    color: white;
    padding: 12px 25px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
    transition: background-color 0.3s;
    font-size: 1.1em;
  }

  .btn-buy:hover {
    background-color: #d35400;
    color: white;
  }

  .btn-back {
    color: #3498db;
    text-decoration: none;
    font-weight: bold;
  }

  .btn-back:hover {
    text-decoration: underline;
  }

  .product-full-content {
    line-height: 1.8;
    color: #444;
  }

  .product-full-content h3 {
    margin-top: 0;
    color: #2c3e50;
  }
</style>
